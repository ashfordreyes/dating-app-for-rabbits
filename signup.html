<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up — Rabbit Tinder</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="app-shell">
        <div class="auth-page">
            <div class="auth-header">
                <div class="hero-emoji">🥕</div>
                <h1>Join the warren</h1>
                <p>Create an account and start matching.</p>
            </div>

            <form id="signup-form" novalidate>
                <div class="form-group">
                    <label for="name">Name</label>
                    <input type="text" id="name" name="name" placeholder="Thumper" autocomplete="name">
                </div>
                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" name="email" placeholder="bugs@bunny.com" autocomplete="email">
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" placeholder="••••••••" autocomplete="new-password">
                </div>
                <div class="form-group">
                    <label for="confirm-password">Confirm Password</label>
                    <input type="password" id="confirm-password" name="confirm-password" placeholder="••••••••" autocomplete="new-password">
                </div>
                <label class="form-checkbox">
                    <input type="checkbox" id="terms" name="terms">
                    I agree to the terms and conditions
                </label>
                <p id="signup-error" class="form-error"></p>
                <button type="submit" class="btn btn-primary">Sign Up</button>
            </form>

            <div class="divider">or</div>

            <script src="https://accounts.google.com/gsi/client" async></script>
            <div id="g_id_onload"
                data-client_id="YOUR_GOOGLE_CLIENT_ID"
                data-login_uri="https://your.domain/your_login_endpoint"
                data-auto_prompt="false">
            </div>
            <div class="g_id_signin"
                data-type="standard"
                data-size="large"
                data-theme="outline"
                data-text="sign_up_with"
                data-shape="rectangular"
                data-logo_alignment="left">
            </div>

            <p class="auth-switch">Already have an account? <a href="login.html">Log in</a></p>
        </div>
    </div>
    <script src="signup.js"></script>
</body>
</html>
