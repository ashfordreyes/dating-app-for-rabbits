<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Log In — Rabbit Tinder</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="app-shell">
        <div class="auth-page">
            <div class="auth-header">
                <div class="hero-emoji">🐰</div>
                <h1>Welcome back</h1>
                <p>Log in to keep hopping through matches.</p>
            </div>

            <form id="login-form" novalidate>
                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" name="email" placeholder="bugs@bunny.com" autocomplete="email">
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" placeholder="••••••••" autocomplete="current-password">
                </div>
                <p id="login-error" class="form-error"></p>
                <button type="submit" class="btn btn-primary">Log In</button>
            </form>

            <p class="auth-switch">Don't have an account? <a href="signup.html">Sign up</a></p>
        </div>
    </div>
    <script src="login.js"></script>
</body>
</html>
